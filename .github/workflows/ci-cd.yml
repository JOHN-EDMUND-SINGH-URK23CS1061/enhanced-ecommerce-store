name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install product-service
      working-directory: ./product-service
      run: npm install

    - name: Install order-service
      working-directory: ./order-service
      run: npm install

    - name: Build Docker images
      run: docker compose build

    - name: Start containers
      run: docker compose up -d

    - name: Check running containers
      run: docker ps

    - name: Health check product service
      run: curl http://localhost:3001/health

    - name: Health check order service
      run: curl http://localhost:3002/health

    - name: Success message
      run: echo "CI/CD Pipeline SUCCESS"