name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Validate project structure
      run: |
        echo "Checking project structure..."
        ls -la
        echo "Checking frontend files..."
        ls -la frontend/
        echo "Checking product-service files..."
        ls -la product-service/
        echo "Checking order-service files..."
        ls -la order-service/
        
    - name: Validate package.json files
      run: |
        echo "Validating product-service package.json..."
        cd product-service
        node -e "console.log('package.json is valid:', JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name)"
        cd ..
        
        echo "Validating order-service package.json..."
        cd order-service
        node -e "console.log('package.json is valid:', JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name)"
        cd ..
        
    - name: Install dependencies
      run: |
        echo "Installing product-service dependencies..."
        cd product-service
        npm install
        cd ..
        
        echo "Installing order-service dependencies..."
        cd order-service
        npm install
        cd ..
        
    - name: Test Docker builds
      run: |
        echo "Testing Docker builds..."
        docker --version
        docker-compose --version
        
        echo "Building product-service..."
        docker build -t test-product-service ./product-service
        
        echo "Building order-service..."
        docker build -t test-order-service ./order-service
        
        echo "Building frontend..."
        docker build -t test-frontend ./frontend
        
        echo "Docker builds successful!"
        docker images | grep test-
        
    - name: Validate Docker Compose
      run: |
        echo "Validating docker-compose.yml..."
        docker-compose config
        
    - name: Success Summary
      run: |
        echo "========================================="
        echo "CI/CD Pipeline Completed Successfully!"
        echo "========================================="
        echo "Project Structure: Valid"
        echo "Package Files: Valid"
        echo "Dependencies: Installed"
        echo "Docker Builds: Successful"
        echo "Docker Compose: Valid"
        echo "========================================="
        echo "Enhanced eCommerce Store is ready for deployment!"
        echo "Features: Shopping Cart, Search, Categories, Modern UI"
        echo "========================================="
