name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies for product-service
      run: |
        cd product-service
        npm ci
        
    - name: Install dependencies for order-service
      run: |
        cd order-service
        npm ci
        
    - name: Run lint checks (product-service)
      run: |
        cd product-service
        npm ls
        
    - name: Run lint checks (order-service)
      run: |
        cd order-service
        npm ls
        
    - name: Validate package.json files
      run: |
        node -e "
          const fs = require('fs');
          const services = ['product-service', 'order-service'];
          services.forEach(service => {
            const pkg = JSON.parse(fs.readFileSync(\`\${service}/package.json\`, 'utf8'));
            console.log(\`✓ \${service} package.json is valid\`);
            console.log(\`  - Name: \${pkg.name}\`);
            console.log(\`  - Version: \${pkg.version}\`);
          });
        "

  docker:
    runs-on: ubuntu-latest
    needs: ci
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build product-service image
      run: |
        docker build -t ecommerce-product-service ./product-service
        docker images ecommerce-product-service
        
    - name: Build order-service image
      run: |
        docker build -t ecommerce-order-service ./order-service
        docker images ecommerce-order-service
        
    - name: Build frontend image
      run: |
        docker build -t ecommerce-frontend ./frontend
        docker images ecommerce-frontend
        
    - name: Test Docker images
      run: |
        echo "Testing product-service image..."
        docker run --rm -d --name test-product -p 3001:3001 ecommerce-product-service
        sleep 10
        curl -f http://localhost:3001/health || exit 1
        docker stop test-product
        
        echo "Testing order-service image..."
        docker run --rm -d --name test-order -p 3002:3002 -e PRODUCT_SERVICE_URL=http://localhost:3001 ecommerce-order-service
        sleep 10
        curl -f http://localhost:3002/health || exit 1
        docker stop test-order
        
        echo "Testing frontend image..."
        docker run --rm -d --name test-frontend -p 3000:80 ecommerce-frontend
        sleep 5
        curl -f http://localhost:3000 || exit 1
        docker stop test-frontend

  docker-compose:
    runs-on: ubuntu-latest
    needs: docker
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build and start services with docker-compose
      run: |
        docker-compose build
        docker-compose up -d
        
    - name: Wait for services to be ready
      run: |
        echo "Waiting for services to be ready..."
        sleep 30
        
    - name: Test services health
      run: |
        echo "Testing product-service health..."
        curl -f http://localhost:3001/health || exit 1
        
        echo "Testing order-service health..."
        curl -f http://localhost:3002/health || exit 1
        
        echo "Testing frontend..."
        curl -f http://localhost:3000 || exit 1
        
    - name: Test API endpoints
      run: |
        echo "Testing product-service endpoints..."
        curl -f http://localhost:3001/products || exit 1
        
        echo "Testing order-service endpoints..."
        curl -f http://localhost:3002/orders || exit 1
        
    - name: Cleanup
      run: |
        docker-compose down
        docker system prune -f
