name: CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Check project structure
      run: ls -R

    - name: Install product-service
      working-directory: ./product-service
      run: npm install

    - name: Install order-service
      working-directory: ./order-service
      run: npm install

    - name: Build Docker containers
      run: docker compose build

    - name: Start services
      run: docker compose up -d

    - name: Wait for services
      run: sleep 15

    - name: Check containers
      run: docker ps

    - name: Test product API
      run: curl http://localhost:3001/health || true

    - name: Test order API
      run: curl http://localhost:3002/health || true

    - name: Done
      run: echo "CI/CD SUCCESS"